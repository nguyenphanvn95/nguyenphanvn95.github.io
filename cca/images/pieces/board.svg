  <!-- River text -->
  <text x="145" y="298" fill="#8b6914" font-size="28" font-family="serif" opacity="0.5">楚河</text>
  <text x="310" y="298" fill="#8b6914" font-size="28" font-family="serif" opacity="0.5">漢界</text>
